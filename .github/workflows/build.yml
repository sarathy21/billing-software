name: Build and Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm run rebuild:native

      - name: Build CSS
        run: npm run css:build

      - name: Get previous version
        id: prev_version
        run: |
          PREV_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "1.0.0")
          echo "version=$PREV_VERSION" >> $GITHUB_OUTPUT

      - name: Increment version
        id: new_version
        run: |
          PREV_VERSION=$(node -e "console.log(require('./package.json').version)")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$PREV_VERSION"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: |
          npm version ${{ steps.new_version.outputs.version }} --no-git-tag-v

      - name: Build app for macOS
        run: npm run build -- -m dmg zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ steps.new_version.outputs.version }}
          name: Release v${{ steps.new_version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
          body: |
            ## Billing Software v${{ steps.new_version.outputs.version }}
            
            ### Automated Release
            This release was automatically built and published from main branch.
            
            **macOS Installation:**
            - Download the `.dmg` file
            - Open it and drag the app to Applications folder
            
            **Auto-Update:**
            Existing installations will automatically detect and download this update.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version update
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.new_version.outputs.version }}" || true
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
