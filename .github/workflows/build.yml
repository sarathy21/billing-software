name: Build and Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm run rebuild:native

      - name: Build CSS
        run: npm run css:build

      - name: Set build version
        id: build_version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR _ <<< "$BASE_VERSION"
          BUILD_VERSION="$MAJOR.$MINOR.${{ github.run_number }}"
          npm version "$BUILD_VERSION" --no-git-tag-version --allow-same-version
          echo "version=$BUILD_VERSION" >> $GITHUB_OUTPUT

      - name: Build app for macOS
        run: npm run build -- -m dmg zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ steps.build_version.outputs.version }}
          name: Release v${{ steps.build_version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
          body: |
            ## Billing Software v${{ steps.build_version.outputs.version }}
            
            ### Automated Release
            This release was automatically built and published from main branch.
            
            **macOS Installation:**
            - Download the `.dmg` file
            - Open it and drag the app to Applications folder
            
            **Auto-Update:**
            Existing installations will automatically detect and download this update.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
